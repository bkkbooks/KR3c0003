body:
  text: 無厚篇無厚篇天於人無厚也君於民無厚也父於子無厚也兄於弟無厚也何以言之天不能屏勃厲之氣全夭折之人使為善之民必壽此於民無厚也凡民有穿窬為盜者有詐偽相迷者此皆生於不足起於貧窮而君必執法誅之此於民無厚也堯舜位為天子而丹朱商均為布衣此於子無厚也周公誅管蔡此於弟無厚也推此言之何厚之有循名責實君之事也奉法宣令臣之職也下不得自擅上操其柄而不理者未之有也君有三纍臣有四責何謂三纍惟親所信一纍以名取士二纍近故親踈三纍何謂四責受重賞而無功一責居大位而不治二責理官而不平三責御軍陳而奔北四責君無三纍臣無四責可以安國勢者君之輿威者君之策臣者君之馬民者君之輪勢固則輿安威定則策徑臣順則馬良民和則輪利為國失此必有覆車奔馬折輪敗載之患安得不危異同之不可別是非之不可定白黑之不可分清濁之不可理久矣誠聽能聞於無聲視能見於無形計能規於未兆慮能防於未然斯無他也不以耳聽則通於無聲矣不以目視則照於無形矣不以心計則達於無兆矣不以知慮則合於無然矣君者藏形匿影群下無私掩目塞耳萬民恐震循名責實察法立威是明王也夫明於形者分不遇於事察於動者用不失則利故明君審一萬物自定名不可以外務智不可以從他求諸己之謂也治世位不可越職不可亂百官有司各務其刑上循名以督實下奉教而不達所美觀其所終所惡計其所窮喜不以賞怒不以罰可謂治世夫負重者患塗遠據貴者憂民離負重塗遠者身疲而無功在上離民者雖勞而不治故智者量塗而後負明君視民而出政獵羆虎者不於外圂鉤鯨鯢者不居清池何則圂非羆虎之窟也池非鯨鯢之泉也楚之不泝流陳之不束麾長盧之不士呂子之蒙恥夫遊而不見敬不恭也居而不見愛不仁也言而不見用不信也求而不能得無始也謀而不見喜無理也計而不見從遺道也因勢而發譽則行等而名殊人齊而得時則力敵而功倍其所以然者乘勢之在外推辨説非所聽也虛言者非所應也無益之辭非所舉也故談者別殊類使不相害序異端使不相亂諭志通意非務相乖也若飾詞以相亂匿詞以相移非古之辨也慮不先定不可以應卒兵不間習不可以當敵廟算千里帷幄之奇百戰百勝黃帝之師死生自命貧富自時怨夭折者不知命也怨貧賤者不知時也故臨難不懼知天命也貧窮無懾達時序也凶飢之歲父死於室子死於戶而不相怨者無所顧也同舟渡海中流遇風救患若一所憂同也張羅而畋唱和不差者其利等也故體痛者口不能不呼心悅者顏不能不笑責疲者以舉千鈞責兀者以及走兔驅逸足於庭求猿捷於檻斯逆理而求之猶倒裳而索領事有遠而親近而踈就而不用去而反求風此四行明主大憂也夫水濁則無掉尾之魚政苛則無逸樂之士故令煩則民詐政擾則民不定不治其本而務其末譬如拯溺錘之以石救火投之以薪夫達道者無知之道也無能之道也是知大道不知而中不能而成無有而足守虛責實而萬事畢忠言於不忠義生於不義音而不收謂之放言出而不督謂之暗故見其象致其形循其理正其名得其端知其情若此何往不復何事不成有物者意也無外者德也有人者行也無人者道也故德非所履處非所處則失道非其道不道則諂意無賢慮無忠行無道言虛如受實萬事畢夫言榮不若辱非誠辭也得不若失非實談也不進則退不喜則憂不得則亡此世人之常真人危斯十者而為一矣所謂大辨者別天下之行具天下之物選善退惡時措其宜而功立德至矣小辨則不然別言異道以言相射以行相伐使民不知其要無他故焉故淺知也君子并物而錯之兼塗而用之五味未嘗而辨於口五行在身而布於人故何方之道不從面從之義不行治亂之法不用惔然寬裕蕩然簡易略而無失精詳入纖微也夫舟浮於水車轉於陸此自然道也有不治者知不豫焉夫木擊折轊水戾破舟不怨木石而罪巧拙故不載焉故有知則惑德有心則嶮有目則眩是以規矩一定而不易不為秦楚緩節不為胡越改容常一而不邪方行而不流一日形之萬世傳之無為為之也夫自見之明借人見之暗也自聞之聽借人聞之聾也明君知此則去就之分定矣為君當若冬日之陽夏日之陰萬物自歸莫之使也恬臥而功自成優遊而政自治豈在振目扼腕手據鞭朴而後為治歟夫合事有不合者知與未知也合而不結者陽親而陰踈故遠而親者忘相應也近而踈者忘不合也就而不用者策不得也去而反求者無違行也近而不御者心相乖也遠而相思者合其謀也故明君擇人不可不審士之進趣亦不可不詳
