  - {type: variant, offset: 1621, length: 0, content: '', WYG: 轉辭篇世間悲哀喜樂嗔怒憂愁久惑於此今轉之在己為哀在他為悲在己為樂在他為喜在己為嗔在他為怒在己為愁在他為憂在己若扶之與攜謝之與議故之與右諾之與己相去千里也夫言之術與智者言依於博與博者言依於辯與辯者言依於安與貴者言依於勢與富者言依於豪與貧者言依於利與勇者言依於敢與愚者言依於說此言之術也不用在早圖不窮在早稼非所宜言勿言非所宜為勿為以避其危非所宜取勿取以避其咎非所宜争勿争以避其聲一聲而非駟馬勿追一言而急駟馬不及故惡言不岀口茍語不留耳此謂君子也夫任臣之法闇則不任也慧則不從也仁則不親也勇則不近也信則不信也不以人用人故謂之神怒出於不怒為出於不為視於無有則得其所見聽於無聲則得其所聞故無形者有形之本無聲者有聲之母循名責實實之極也按實定名名之極也叅以相平轉而相成故得之形名大川竭而谷虚坵夷而淵實聖人以死大盜不起天下平之故也聖人不死大盜不止何以知其然也為之斗斛而量之則幷與斗斛而竊之為之權衡以平之則幷與權衡而竊之為之符璽以信之則幷與符璽以竊之為之仁義以教之則幷與仁義而竊之何以知其然彼竊財者誅竊國者為諸侯諸侯之門仁義存焉是非竊仁義耶故遂於大盜霸諸侯此重利也盜蹠所不可禁者乃聖人之罪也欲之與惡善之與惡四者變之失恭之與儉敬之與傲四者失之修故善素朴任惔憂而無失未有修焉此德之永也言有信而不為信言有善而不為善者不可不察也夫治之法莫大於私不行功莫大於使民不爭今也立法而行私與法爭其亂也甚於無法立君而爭愚與君爭其亂也甚於無君故有道之國則私善不行君立而愚者不爭民一於君事斷於法此國之道也則君之督大臣縁身而責名縁名而責形縁形而責實臣懼其重誅之至於是不敢行其私矣心欲安静慮欲深逺心安静則心策生慮深逺則計謀成心不欲躁慮不欲淺心躁則精神猾慮淺則百事傾治世之禮簡而易行亂世之禮煩而難遵上古之樂質而不悲當今之樂邪而為淫上古之民質而敦朴今世之民詐而多行上古象刑而民不犯教有墨劓不以為恥斯民所以亂多治少也堯置敢諫之鼓舜立誹謗之木湯有司直之人武有戒慎之銘此四君子者聖人也而猶若此之勤至於栗陸氏殺東里子宿沙氏戮箕文桀誅龍逄紂刳比干四主者亂君故其疾賢若仇是以賢愚之相覺若百丈之谿與萬仞之山若九地之下與重山之巔明君之御民若御奔而無轡履氷而負重親而疎之疎而親之故畏儉則福生驕奢則禍起聖人逍遥一世罕匹萬物之形寂然無鞭扑之罰漠然無叱咤之聲而家給人足天下太平視昭昭知冥冥推未運覩未然故神而不可見幽而不可見此之謂也君人者不能自專而好任下則智日困而數日窮迫於下則不能申行隨於國則不能持知不足以為治威不足以行誅無以與下交矣故喜而使賞不必當功怒而使誅不必值罪不慎喜怒誅賞從其意而欲委任臣下故亡國相繼弑君不絶古人有言衆口鑠金三人成虎不可不察也夫人情發言欲勝舉事欲成故明者不以其短疾人之長不以其拙病人之工言有善者則而賞之言有非者顯而罰之塞邪枉之路蕩淫辭之端臣下閔之左右結舌可謂明君為善者君與之賞為惡者君與之罰因其所以來而報之循其所以進而答之聖人因之故能用之因之循理故能長久今之為君無堯舜之才而慕堯舜之治故終顛殞乎混冥之中而事不覺於昭明之術是以虛慕欲治之名無益亂世之理也患生於官成病始於少瘳禍生於懈慢孝衰於妻子此四者慎終如始也富必給貧壯必給老快情恣欲必多侈侮故曰尊貴所以高人聰明所以寵人資給無以先人剛勇無以勝人能履行此可以為天下君夫謀莫難於必聽事莫難於必成成必合於數聽必合於情故抱薪加火爍者必先燃平地注水濕者必先濡故曰動之以其類安有不應者獨行之術也明君立法之後中程者賞缺繩者誅此之謂君曰亂君國曰亡國智者寂於是非故善惡有别明者寂於去就故進退無類若智不能察是非明不能審去就斯為虛妄目貴明耳貴聰心貴公以天下之目視則無不見以天下之耳聽則無不聞以天下之智慮則無不知得此三術則存於不為也鄧子}
