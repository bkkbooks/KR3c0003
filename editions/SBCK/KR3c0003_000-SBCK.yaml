body:
  text: 鄧析子崇文總目鄧析子戰國時人漢志二篇􅀄析著書四篇劉歆有目有一篇凡五歆復校爲二篇中鄧析書四篇臣叙書一篇凡中外書五篇以相校除復重爲一篇皆定殺而書可繕寫也鄧析者鄭人也好刑名操兩可之說設無窮之辭當子産之世數難子産之法記或云子産起而戮之於春秋左氏傳昭公二十年而子産卒子太叔嗣爲政定公八年太叔卒駟歂嗣爲政明年乃殺鄧析而用其竹刑君子謂子歂於是乎不忠苟有可以加於國家棄其邪可也靜女之三章取彤管焉竿旄何以告之取其忠也故用其道不棄其人詩之蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹也况用其道不恤其人乎然無以勸能矣竹刑簡法也久逺世無其書子産卒後二十年而鄧析死傳說或稱子産誅鄧析非也其論無厚者言之異同與公孫龍同􅀋謹第一
