body:
  text: 鄧子法家類提要臣等謹案鄧子一卷周鄧析撰析鄭人列子力命篇曰鄧析操兩可之說設無窮之詞子産執政作竹杖鄭國用之數難子産之治子産屈之子産執而戮之俄而誅之劉歆奏上其書案高似孫子畧誤以此奏為劉向今據書録解題改正則曰於春秋左氏傳昭公二十年而子産卒子太叔嗣為政定公八年太叔卒駟歂嗣為政明年乃殺鄧析而用其竹刑然則列子為誤矣其書漢志作二篇今本仍分無厚轉辭二篇而併為一卷然其文節次不相屬似亦掇拾之本也其言如天於人無厚君於民無厚父於子無厚兄於弟無厚勢者君之輿威者君之策則其㫖同於申韓如令煩則民詐政擾則民不定心欲安静慮欲深逺則其㫖同於黄老然其大㫖主於勢統於尊事覈於實於法家為近故竹刑為鄭所用也至於聖人不死大盗不止一條其文與莊子同析逺在莊周以前不應預有勦說而莊子所載又不云鄧析之言或篇章殘缺後人摭莊子以足之歟乾隆四十七年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鄧子序中鄧析書四篇臣叙書一篇凡中外書五篇以相校除復重為一篇皆定殺而書可繕冩也鄧析者鄭人也好刑名操兩可之說設無窮之辭當子産之世數難子産之法記或云子産起而戮之於春秋左氏傳昭公二十年而子産卒子太叔嗣為政定公八年太叔卒駟歂嗣為政明年乃殺鄧析而用其竹刑君子謂子歂於是乎不忠茍有可以加於國家棄其邪可也靜女之三章取彤管焉竿旄何以告之取其忠也故用其道不棄其人詩之蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹也况用其道不恤其人乎然無以勸能矣竹刑簡法也久遠世無其書子産卒後二十年而鄧析死傳說或稱子産誅鄧析非也其論無厚者言之異同與公孫龍同類謹上
