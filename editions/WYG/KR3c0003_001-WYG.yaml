body:
  text: 鄧子周鄧析撰無厚篇天於人無厚也君於民無厚也父於子無厚也兄於弟無厚也何以言之天不能屛勃厲之氣全夭折之人使為善之民必壽此於民無厚也凡民有穿窬為盗者有詐偽相述者此皆生於不足起於貧窮而君必執法誅之此於民無厚也堯舜位為天子而丹朱商均為布衣此於子無厚也周公誅管蔡此於弟無厚也推此言之何厚之有循名責實君之事也奉法宣令臣之職也下不得自擅上操其柄而不理者未之有也君有三累臣有四責何謂三累惟親所信一累以名取士二累近故親疎三累何謂四責受重賞而無功一責居大位而不治二責理官而不平三責御軍陣而奔北四責君無三累臣無四責可以安國勢者君之輿威者君之策臣者君之馬民者君之輪勢固則輿安威定則策勁臣順則馬良民和則輪利為國失此必有覆車奔馬折輪敗載之患安得不危異同之不可别是非之不可定白黑之不可分清濁之不可理久矣誠聽能聞於無聲視能見於無形計能規於未兆慮能防於未然斯無他也不以耳聽則通於無聲矣不以目視則照於無形矣不以心計則達於無兆矣不以知慮則合於未然矣君者藏形匿影羣下無私掩目塞耳萬民恐震循名責實察法立威是明王也夫明於形者分不遇於事察於動者用不失則利故明君審一萬物自定名不可以外務智不可以他從求諸己之謂也治世位不可越職不可亂百官有司各務其刑上循名以督實下奉教而不違所美觀其所終所惡計其所窮喜不以賞怒不以罰可謂治世夫負重者患塗遠據貴者憂民離負重塗遠者身疲而無功在上離民者雖勞而不治故智者量塗而後負明君視民而出政獵羆虎者不於外圂釣鯨鯢者不居清池何則圂非羆虎之窟也池非鯨鯢之泉也楚之不泝流陳之不束麾長盧之不士吕子之蒙恥夫遊而不見敬不恭也居而不見愛不仁也言而不見用不信也求而不見得無始也謀而不見喜無理也計而不見從遺道也因勢而發譽則行等而名殊人齊而得時則力敵而功倍其所以然者乘勢之在外推辯説非所聴也虚言向非所應也無益亂非舉也故談者别殊類使不相害序異端使不相亂諭志通意非務相乖也若飾詞以相亂匿詞以相移非古之辯也慮不先定不可以應卒兵不閑習不可以當敵廟算千里帷幄之竒百戰百勝黄帝之師死生自命貧富自時怨夭折者不知命也怨貧賤者不知時也故臨難不懼知天命也貧窮無懾達時序也凶饑之歳父死於室子死於户而不相怨者無所顧也同舟渡海中流遇風救患若一所憂同也張羅而畋唱和不差者其利等也故體痛者口不能不呼心悦者顔不能不笑責疲者以舉千鈞責兀者以及走兔驅逸足於庭求援捷於檻斯逆理而求之猶倒裳而索領事有遠而親近而疎就而不用去而求反凡此四行明主大憂也夫水濁則無掉尾之魚政苛則無逸樂之士故令煩則民詐政擾則民不定不治其本而務其末譬如拯溺錘之石救火投之以薪夫達道者無知之道也無能之道也是知大道不知而中不能而成無有而足守虚責實而萬事畢忠言於不忠義生於不義音而不收謂之放言出而不督謂之闇故見其象致其形循其理正其名得其端知其情若此何往不復何事不成有物者意也無外者德也有人者行也無人者道也故德非所履處非所處則失道非其道不道則諂意無賢慮無忠行無道言虚如受實萬事畢夫言榮不若辱非誠辭也得不若失非實談也不進則退不喜則憂不得則亡此世人之常真人危斯十者而為一矣所為大辯者别天下之行具天下之物選善退惡時措其宜而功立德至矣小辯則不然别言異道以言相射以行相伐使民不知其要無他故焉故知淺也君子幷物而錯之兼塗而用之五味未嘗而辨於口五行在身而布於人故何方之道不從面從之義不行治亂之法不用惔然寛裕蕩然簡易略而無失精詳入纎㣲也夫舟浮於水車轉於陸此自然道也有不治者知不豫焉夫木擊折轊水戾破舟不怨木石而罪工拙故不載焉故有知則感有心則嶮有目則眩是以規矩一而不易不為秦楚緩節不為吴越改容一而不邪方行而不流一日形之萬世傳之無為為之也夫自見之明借人見之闇也自聞之聰借人聞之聾也明君知此則去就之分定矣為君當若冬日之陽夏日之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目搤腕手據鞭扑而後為治歟夫合事有不合者知與未知也合而不結者陽親而隂疎故逺而親者忘相應也近而疎者忘不合也就而不用者策不得也去而反求者無違行也近而不御者心相乖也遠而相思者合其謀也故明君擇人不可不審士之進趣亦不可不詳轉辭篇世間悲哀喜樂嗔怒憂愁久惑於此今轉之在己為哀在他為悲在己為樂在他為喜在己為嗔在他為怒在己為愁在他為憂在己若扶之與攜謝之與議故之與右諾之與己相去千里也夫言之術與智者言依於博與博者言依於辯與辯者言依於安與貴者言依於勢與富者言依於豪與貧者言依於利與勇者言依於敢與愚者言依於說此言之術也不用在早圖不窮在早稼非所宜言勿言非所宜為勿為以避其危非所宜取勿取以避其咎非所宜争勿争以避其聲一聲而非駟馬勿追一言而急駟馬不及故惡言不岀口茍語不留耳此謂君子也夫任臣之法闇則不任也慧則不從也仁則不親也勇則不近也信則不信也不以人用人故謂之神怒出於不怒為出於不為視於無有則得其所見聽於無聲則得其所聞故無形者有形之本無聲者有聲之母循名責實實之極也按實定名名之極也叅以相平轉而相成故得之形名大川竭而谷虚坵夷而淵實聖人以死大盜不起天下平之故也聖人不死大盜不止何以知其然也為之斗斛而量之則幷與斗斛而竊之為之權衡以平之則幷與權衡而竊之為之符璽以信之則幷與符璽以竊之為之仁義以教之則幷與仁義而竊之何以知其然彼竊財者誅竊國者為諸侯諸侯之門仁義存焉是非竊仁義耶故遂於大盜霸諸侯此重利也盜蹠所不可禁者乃聖人之罪也欲之與惡善之與惡四者變之失恭之與儉敬之與傲四者失之修故善素朴任惔憂而無失未有修焉此德之永也言有信而不為信言有善而不為善者不可不察也夫治之法莫大於私不行功莫大於使民不爭今也立法而行私與法爭其亂也甚於無法立君而爭愚與君爭其亂也甚於無君故有道之國則私善不行君立而愚者不爭民一於君事斷於法此國之道也則君之督大臣縁身而責名縁名而責形縁形而責實臣懼其重誅之至於是不敢行其私矣心欲安静慮欲深逺心安静則心策生慮深逺則計謀成心不欲躁慮不欲淺心躁則精神猾慮淺則百事傾治世之禮簡而易行亂世之禮煩而難遵上古之樂質而不悲當今之樂邪而為淫上古之民質而敦朴今世之民詐而多行上古象刑而民不犯教有墨劓不以為恥斯民所以亂多治少也堯置敢諫之鼓舜立誹謗之木湯有司直之人武有戒慎之銘此四君子者聖人也而猶若此之勤至於栗陸氏殺東里子宿沙氏戮箕文桀誅龍逄紂刳比干四主者亂君故其疾賢若仇是以賢愚之相覺若百丈之谿與萬仞之山若九地之下與重山之巔明君之御民若御奔而無轡履氷而負重親而疎之疎而親之故畏儉則福生驕奢則禍起聖人逍遥一世罕匹萬物之形寂然無鞭扑之罰漠然無叱咤之聲而家給人足天下太平視昭昭知冥冥推未運覩未然故神而不可見幽而不可見此之謂也君人者不能自專而好任下則智日困而數日窮迫於下則不能申行隨於國則不能持知不足以為治威不足以行誅無以與下交矣故喜而使賞不必當功怒而使誅不必值罪不慎喜怒誅賞從其意而欲委任臣下故亡國相繼弑君不絶古人有言衆口鑠金三人成虎不可不察也夫人情發言欲勝舉事欲成故明者不以其短疾人之長不以其拙病人之工言有善者則而賞之言有非者顯而罰之塞邪枉之路蕩淫辭之端臣下閔之左右結舌可謂明君為善者君與之賞為惡者君與之罰因其所以來而報之循其所以進而答之聖人因之故能用之因之循理故能長久今之為君無堯舜之才而慕堯舜之治故終顛殞乎混冥之中而事不覺於昭明之術是以虛慕欲治之名無益亂世之理也患生於官成病始於少瘳禍生於懈慢孝衰於妻子此四者慎終如始也富必給貧壯必給老快情恣欲必多侈侮故曰尊貴所以高人聰明所以寵人資給無以先人剛勇無以勝人能履行此可以為天下君夫謀莫難於必聽事莫難於必成成必合於數聽必合於情故抱薪加火爍者必先燃平地注水濕者必先濡故曰動之以其類安有不應者獨行之術也明君立法之後中程者賞缺繩者誅此之謂君曰亂君國曰亡國智者寂於是非故善惡有别明者寂於去就故進退無類若智不能察是非明不能審去就斯為虛妄目貴明耳貴聰心貴公以天下之目視則無不見以天下之耳聽則無不聞以天下之智慮則無不知得此三術則存於不為也鄧子
