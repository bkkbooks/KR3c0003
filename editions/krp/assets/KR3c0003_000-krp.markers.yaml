  - {type: variant, offset: 158, length: 216, content: 今本仍分無厚轉辭二篇而併為一卷然其文節次不相屬似亦掇拾之本也其言如天於人無厚君於民無厚父於子無厚兄於弟無厚勢者君之輿威者君之策則其㫖同於申韓如令煩則民詐政擾則民不定心欲安静慮欲深逺則其㫖同於黄老然其大㫖主於勢統於尊事覈於實於法家為近故竹刑為鄭所用也至於聖人不死大盗不止一條其文與莊子同析逺在莊周以前不應預有勦說而莊子所載又不云鄧析之言或篇章殘缺後人摭莊子以足之歟乾隆四十七年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鄧子序, SBCK: ''}
